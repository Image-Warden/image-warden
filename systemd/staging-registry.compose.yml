# staging-registry.compose.yml
# Docker Compose equivalent of staging-registry.container (Podman Quadlet)
#
# Usage:
#   docker compose -f staging-registry.compose.yml up -d
#
# Adjust the volume paths before starting.
# The registry config.yml must enable deletion (required for iw-cleanup GC).
# See docs/registry-config.md for a minimal config.yml example.

services:
  staging-registry:
    image: docker.io/library/registry:3
    container_name: staging-registry
    restart: always
    ports:
      - "127.0.0.1:5000:5000"   # bind to localhost only

    # TODO: set volume paths
    volumes:
      []
      # - /path/to/registry/data:/var/lib/registry
      # - /path/to/registry/config.yml:/etc/distribution/config.yml:ro

    healthcheck:
      test: >
        sh -c "wget -q -O /dev/null --server-response
        http://127.0.0.1:5000/v2/ 2>&1 | grep -qE 'HTTP/[0-9.]+ (200|401)'"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
